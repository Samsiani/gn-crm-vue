name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create plugin ZIP
        run: |
          mkdir -p /tmp/release/cig-headless
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='CLAUDE.md' \
            ./ /tmp/release/cig-headless/
          cd /tmp/release
          zip -r cig-headless-v${{ steps.version.outputs.VERSION }}.zip cig-headless/
          echo "ZIP: $(ls -lh cig-headless-v${{ steps.version.outputs.VERSION }}.zip)"

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/release/cig-headless-v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
